name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-deploy-main
  cancel-in-progress: false

jobs:
  trigger-vercel:
    runs-on: ubuntu-latest
    steps:
      - name: Fire Vercel deploy hook
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          response=$(curl -sf -X POST "$HOOK")
          echo "Vercel response: $response"
